<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGSW Exam Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #211f35;
    --accent1: #e8c547;
    --accent2: #7c6af7;
    --accent3: #f05d5e;
    --accent4: #4ecdc4;
    --text: #fffffe;
    --muted: #9b9ab5;
    --border: rgba(255,255,255,0.08);
    --correct: #4ecdc4;
    --partial: #e8c547;
    --incorrect: #f05d5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(232,197,71,0.07) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 24px 60px; }
  header { text-align: center; margin-bottom: 40px; }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--accent1); margin-bottom: 12px; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; line-height: 1.1; margin-bottom: 12px; }
  .subtitle { color: var(--muted); font-size: 15px; font-weight: 300; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 32px; }
  .filter-btn {
    padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .filter-btn.active { color: var(--bg); font-weight: 600; border-color: transparent; }
  .filter-btn[data-cat="all"].active { background: var(--text); }
  .filter-btn[data-cat="Human Development & Behavior"].active { background: var(--accent2); }
  .filter-btn[data-cat="Assessment & Intervention"].active { background: var(--accent4); }
  .filter-btn[data-cat="Ethics & Professional Standards"].active { background: var(--accent1); }
  .filter-btn[data-cat="Diversity & Social Justice"].active { background: var(--accent3); }
  .progress-bar { background: var(--surface); border-radius: 100px; height: 4px; margin-bottom: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent1)); border-radius: 100px; transition: width 0.4s ease; }
  .progress-label { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .progress-label span { color: var(--text); font-weight: 500; }
  .card-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-counter { font-size: 13px; color: var(--muted); }
  .card-counter span { color: var(--text); font-weight: 600; }
  .mastered-btn {
    padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .mastered-btn.done { background: rgba(78,205,196,0.15); border-color: var(--accent4); color: var(--accent4); }
  .card-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 40px; margin-bottom: 20px; transition: border-color 0.3s;
  }
  .card-box.correct-border { border-color: var(--correct); }
  .card-box.partial-border { border-color: var(--partial); }
  .card-box.incorrect-border { border-color: var(--incorrect); }
  .card-category {
    font-size: 10px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-question {
    font-family: 'Playfair Display', serif; font-size: clamp(1.05rem, 2.5vw, 1.35rem);
    line-height: 1.5; color: var(--text); margin-bottom: 28px;
  }
  .answer-area { display: flex; flex-direction: column; gap: 12px; }
  .answer-input {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; padding: 14px 18px; resize: vertical; min-height: 90px;
    transition: border-color 0.2s; outline: none;
  }
  .answer-input:focus { border-color: var(--accent2); }
  .answer-input:disabled { opacity: 0.6; }
  .submit-row { display: flex; gap: 10px; align-items: center; }
  .btn-check {
    padding: 12px 28px; border-radius: 12px; background: var(--accent2); border: none;
    color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-check:hover { background: #8f7fff; transform: translateY(-1px); }
  .btn-check:disabled { opacity: 0.4; cursor: default; transform: none; }
  .btn-skip {
    padding: 12px 20px; border-radius: 12px; background: transparent;
    border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-skip:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .btn-skip:disabled { opacity: 0.3; cursor: default; }
  .result-box { display: none; border-radius: 14px; padding: 18px 20px; margin-top: 4px; }
  .result-box.show { display: block; }
  .result-box.correct { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.3); }
  .result-box.partial { background: rgba(232,197,71,0.1); border: 1px solid rgba(232,197,71,0.3); }
  .result-box.incorrect { background: rgba(240,93,94,0.1); border: 1px solid rgba(240,93,94,0.3); }
  .result-verdict {
    font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .result-box.correct .result-verdict { color: var(--correct); }
  .result-box.partial .result-verdict { color: var(--partial); }
  .result-box.incorrect .result-verdict { color: var(--incorrect); }
  .result-answer { font-size: 14px; line-height: 1.7; color: var(--text); font-weight: 300; }
  .result-answer strong { font-weight: 600; }
  .keywords-hit { margin-top: 10px; font-size: 12px; color: var(--muted); }
  .kw { display: inline-block; padding: 2px 8px; border-radius: 6px; margin: 2px; font-size: 11px; font-weight: 500; }
  .kw.hit { background: rgba(78,205,196,0.15); color: var(--correct); }
  .kw.miss { background: rgba(255,255,255,0.05); color: var(--muted); }
  .controls { display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 8px; }
  .btn {
    display: flex; align-items: center; gap: 8px; padding: 13px 24px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: var(--card); transform: translateY(-1px); }
  .btn-icon { font-size: 18px; }
  .stats { display: flex; gap: 14px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 20px; text-align: center; min-width: 90px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  @media (max-width: 600px) {
    .card-box { padding: 24px 22px; }
    .submit-row { flex-direction: column; align-items: stretch; }
    .btn-check { text-align: center; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">Study Tool</div>
    <h1>LGSW Exam<br>Flashcards</h1>
    <p class="subtitle">Type your answer — get instant feedback</p>
  </header>
  <div class="filters" id="filters"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <p class="progress-label">Card <span id="cardNum">1</span> of <span id="cardTotal">35</span></p>
  <div class="card-actions">
    <div class="card-counter">✓ Mastered: <span id="masteredCount">0</span></div>
    <button class="mastered-btn" id="masteredBtn" onclick="toggleMastered()">✓ Mark Mastered</button>
  </div>
  <div class="card-box" id="cardBox">
    <div class="card-category" id="cardCat"></div>
    <div class="card-question" id="cardQ"></div>
    <div class="answer-area">
      <textarea class="answer-input" id="answerInput" placeholder="Type your answer here…" rows="3"></textarea>
      <div class="submit-row">
        <button class="btn-check" id="checkBtn" onclick="checkAnswer()">Check Answer</button>
        <button class="btn-skip" id="showBtn" onclick="showAnswer()">Show Answer</button>
        <button class="btn-skip btn-skip-only" id="skipBtn" onclick="skipCard()">Skip →</button>
      </div>
      <div class="result-box" id="resultBox">
        <div class="result-verdict" id="resultVerdict"></div>
        <div class="result-answer" id="resultAnswer"></div>
        <div class="keywords-hit" id="keywordsHit"></div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" onclick="prevCard()"><span class="btn-icon">←</span> Prev</button>
    <button class="btn" onclick="nextCard()">Next <span class="btn-icon">→</span></button>
    <button class="btn" onclick="shuffleCards()" title="Shuffle">🔀</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" style="color:var(--accent2)" id="statCorrect">0</div><div class="stat-label">Correct</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--partial)" id="statPartial">0</div><div class="stat-label">Partial</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--incorrect)" id="statIncorrect">0</div><div class="stat-label">Incorrect</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent4)" id="statMastered">0</div><div class="stat-label">Mastered</div></div>
  </div>

  <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
    <button class="btn-skip" onclick="saveSession()" style="padding:10px 20px;border-radius:10px;font-size:13px;">💾 Save Session & Reset</button>
    <button class="btn-skip" onclick="resetAll()" style="padding:10px 20px;border-radius:10px;font-size:13px;color:var(--incorrect);border-color:rgba(240,93,94,0.3);">✕ Clear Answers</button>
  </div>

  <div style="margin-top:32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;">
    <div style="font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent1);margin-bottom:16px;">📊 Session History</div>
    <div id="historyList"></div>
  </div>
</div>
<script>
const CAT_COLORS = {
  "Human Development & Behavior": { color: "#7c6af7" },
  "Assessment & Intervention": { color: "#4ecdc4" },
  "Ethics & Professional Standards": { color: "#e8c547" },
  "Diversity & Social Justice": { color: "#f05d5e" }
};
const ALL_CARDS = [
  { cat: "Human Development & Behavior", q: "What are Erikson's first three stages of psychosocial development?", a: "Trust vs. Mistrust (0–1), Autonomy vs. Shame & Doubt (1–3), and Initiative vs. Guilt (3–6). Each stage presents a central developmental conflict that shapes personality.", keywords: ["erikson","trust","mistrust","autonomy","shame","initiative","guilt","stage","conflict","developmental"] },
  { cat: "Human Development & Behavior", q: "What is attachment theory, and who developed it?", a: "John Bowlby developed attachment theory, proposing that early bonds between children and caregivers are essential for healthy emotional and social development. Ainsworth later identified secure, anxious-avoidant, and anxious-ambivalent attachment styles.", keywords: ["bowlby","attachment","caregiver","ainsworth","secure","avoidant","ambivalent","bond","emotional"] },
  { cat: "Human Development & Behavior", q: "Define 'resiliency' in the context of social work practice.", a: "Resiliency is the capacity of individuals to navigate adversity, trauma, or stress and to recover and adapt positively. It involves both individual strengths and protective factors in the environment.", keywords: ["resilience","resiliency","adversity","trauma","stress","recover","adapt","strengths","protective","capacity"] },
  { cat: "Human Development & Behavior", q: "What is the ecological systems theory (Bronfenbrenner)?", a: "Bronfenbrenner's model views human development within nested environmental systems: microsystem, mesosystem, exosystem, macrosystem, and chronosystem.", keywords: ["bronfenbrenner","ecological","microsystem","mesosystem","exosystem","macrosystem","chronosystem","nested","environment","systems"] },
  { cat: "Human Development & Behavior", q: "Describe Piaget's four stages of cognitive development.", a: "Sensorimotor (0–2), Preoperational (2–7), Concrete Operational (7–11), and Formal Operational (12+). Each stage represents a qualitatively different way of thinking.", keywords: ["piaget","sensorimotor","preoperational","concrete","formal","operational","cognitive","stage","thinking"] },
  { cat: "Human Development & Behavior", q: "What is the difference between nature and nurture in human development?", a: "Nature refers to genetic and biological factors; nurture refers to environmental and experiential influences. Modern social work takes an interactionist view—both interact dynamically.", keywords: ["nature","nurture","genetic","biological","environment","interactionist","experience","development"] },
  { cat: "Human Development & Behavior", q: "What is a 'genogram' and how is it used?", a: "A genogram is a visual representation of family relationships across generations using standardized symbols. It helps identify patterns of behavior, illness, and multigenerational dynamics.", keywords: ["genogram","family","generations","symbols","patterns","relationships","visual","multigenerational"] },
  { cat: "Human Development & Behavior", q: "Define 'learned helplessness' and its relevance to social work.", a: "Learned helplessness (Seligman) is a condition in which a person believes their actions cannot affect outcomes, often from repeated uncontrollable negative experiences. Relevant in poverty, abuse, and chronic adversity.", keywords: ["learned helplessness","seligman","control","outcomes","uncontrollable","poverty","abuse","adversity","belief"] },
  { cat: "Human Development & Behavior", q: "What is the diathesis-stress model?", a: "This model proposes that mental disorders result from the interaction of a predisposition (diathesis)—biological or psychological vulnerability—and environmental stressors.", keywords: ["diathesis","stress","vulnerability","predisposition","biological","stressor","interaction","mental disorder"] },
  { cat: "Assessment & Intervention", q: "What is motivational interviewing (MI)?", a: "MI is a client-centered, directive method for enhancing intrinsic motivation to change by exploring and resolving ambivalence. Core principles: expressing empathy, developing discrepancy, rolling with resistance, supporting self-efficacy.", keywords: ["motivational interviewing","ambivalence","empathy","discrepancy","resistance","self-efficacy","client-centered","motivation"] },
  { cat: "Assessment & Intervention", q: "What is the biopsychosocial assessment model?", a: "A comprehensive framework that evaluates biological, psychological, and social factors affecting a client's functioning. It guides holistic intervention planning.", keywords: ["biopsychosocial","biological","psychological","social","holistic","assessment","functioning","intervention"] },
  { cat: "Assessment & Intervention", q: "Explain cognitive-behavioral therapy (CBT) in brief.", a: "CBT is a structured, time-limited therapy that addresses dysfunctional thoughts, emotions, and behaviors. Clients identify and challenge cognitive distortions and develop adaptive coping strategies.", keywords: ["CBT","cognitive","behavioral","distortion","thoughts","emotions","behaviors","coping","structured","adaptive"] },
  { cat: "Assessment & Intervention", q: "What is crisis intervention theory?", a: "Crisis intervention theory holds that a crisis is a temporary disruption in equilibrium. The goal is to rapidly restore functioning. Key steps: assessment, rapport, problem identification, coping, and follow-up.", keywords: ["crisis","intervention","equilibrium","temporary","restore","functioning","rapport","coping"] },
  { cat: "Assessment & Intervention", q: "What is the difference between a DSM-5 diagnosis and a social work assessment?", a: "A DSM-5 diagnosis categorizes mental disorders using clinical criteria. A social work assessment is broader—including strengths, environmental context, cultural factors, and social determinants.", keywords: ["DSM","diagnosis","assessment","clinical","strengths","environment","cultural","social determinants","broader"] },
  { cat: "Assessment & Intervention", q: "What are 'mandated reporters' and what are their obligations?", a: "Mandated reporters are professionals legally required to report suspected child abuse or neglect to appropriate authorities (e.g., CPS) when there is reasonable suspicion of maltreatment.", keywords: ["mandated reporter","abuse","neglect","CPS","report","suspicion","child","legal","obligation"] },
  { cat: "Assessment & Intervention", q: "Describe the stages of change (Prochaska & DiClemente).", a: "Precontemplation, Contemplation, Preparation, Action, Maintenance, and Relapse. Used widely in addiction and behavior change work.", keywords: ["prochaska","diclemente","precontemplation","contemplation","preparation","action","maintenance","relapse","stages"] },
  { cat: "Assessment & Intervention", q: "What is a mental status examination (MSE)?", a: "The MSE is a structured assessment of current cognitive and emotional functioning, covering appearance, behavior, speech, mood, affect, thought process, cognition, insight, and judgment.", keywords: ["mental status","MSE","mood","affect","cognition","insight","judgment","appearance","speech","thought"] },
  { cat: "Assessment & Intervention", q: "What is solution-focused brief therapy (SFBT)?", a: "SFBT focuses on clients' strengths and solutions rather than problems. Techniques include the miracle question, scaling questions, and identifying exceptions to the problem.", keywords: ["solution-focused","SFBT","strengths","miracle question","scaling","exceptions","brief","solutions"] },
  { cat: "Ethics & Professional Standards", q: "What are the six core values of the NASW Code of Ethics?", a: "Service, Social Justice, Dignity and Worth of the Person, Importance of Human Relationships, Integrity, and Competence.", keywords: ["service","social justice","dignity","worth","human relationships","integrity","competence","NASW","values"] },
  { cat: "Ethics & Professional Standards", q: "What is informed consent in social work practice?", a: "Informed consent requires clients to receive and understand information about services, risks, benefits, alternatives, and their right to withdraw before agreeing to treatment. It must be voluntary with capacity assessed.", keywords: ["informed consent","voluntary","capacity","risks","benefits","alternatives","withdraw","treatment","client"] },
  { cat: "Ethics & Professional Standards", q: "Define 'dual relationship' and explain why it is ethically problematic.", a: "A dual relationship occurs when a social worker has both a professional and another type of relationship (personal, business, sexual) with a client. It can impair judgment, exploit the client, and compromise the therapeutic relationship.", keywords: ["dual relationship","professional","personal","exploit","judgment","boundary","therapeutic","impair"] },
  { cat: "Ethics & Professional Standards", q: "When is it ethically permissible to break confidentiality?", a: "Confidentiality may be broken when a client poses an imminent threat to themselves or others (Tarasoff), when abuse/neglect is suspected, by court order, or with written client consent.", keywords: ["confidentiality","Tarasoff","imminent","threat","abuse","court order","consent","mandatory"] },
  { cat: "Ethics & Professional Standards", q: "What is the Tarasoff duty to warn?", a: "Following Tarasoff v. Regents of UC (1976), mental health professionals have a legal duty to protect identifiable third parties when a client makes a credible threat—by warning the victim or notifying law enforcement.", keywords: ["Tarasoff","duty to warn","protect","third party","threat","credible","law enforcement","1976","legal"] },
  { cat: "Ethics & Professional Standards", q: "What is client self-determination in social work?", a: "Self-determination is the ethical principle that clients have the right to make their own choices and decisions. Social workers support this right while also considering safety and wellbeing.", keywords: ["self-determination","autonomy","choice","rights","client","decision","support","wellbeing","safety"] },
  { cat: "Ethics & Professional Standards", q: "What is countertransference and why does it matter ethically?", a: "Countertransference refers to a social worker's emotional reactions to a client, often rooted in the worker's own unresolved issues. It can distort judgment and harm the therapeutic relationship—regular supervision is essential.", keywords: ["countertransference","emotional reaction","unresolved","supervision","judgment","therapeutic","distort","bias"] },
  { cat: "Ethics & Professional Standards", q: "What does 'cultural competence' mean in professional social work ethics?", a: "Cultural competence means continuously developing knowledge, awareness, and skills to work effectively across diverse cultural contexts, including examining one's own biases.", keywords: ["cultural competence","diversity","awareness","bias","knowledge","skills","culture","examine"] },
  { cat: "Ethics & Professional Standards", q: "What is the difference between personal values and professional ethics?", a: "Personal values are individual beliefs; professional ethics are NASW standards that guide practice. When they conflict, social workers must uphold professional ethics and may refer clients when personal values would impede service.", keywords: ["personal values","professional ethics","NASW","conflict","refer","impede","standards","obligation"] },
  { cat: "Diversity & Social Justice", q: "Define 'intersectionality' and its significance in social work.", a: "Coined by Kimberlé Crenshaw, intersectionality recognizes that aspects of identity (race, gender, class, sexuality, disability) overlap and create compounded forms of discrimination and privilege.", keywords: ["intersectionality","crenshaw","race","gender","class","sexuality","disability","compounded","discrimination","identity"] },
  { cat: "Diversity & Social Justice", q: "What is systemic racism and how does it affect social work clients?", a: "Systemic racism refers to policies, practices, and institutional norms that produce racial inequities even without individual racist intent—affecting clients through disparities in housing, employment, health care, education, and criminal justice.", keywords: ["systemic racism","institutional","policies","inequity","disparity","housing","employment","criminal justice","structural","race"] },
  { cat: "Diversity & Social Justice", q: "What is the difference between equity and equality?", a: "Equality means providing the same resources to everyone; equity means distributing resources based on individual need to achieve fair outcomes. Social work advocates for equity.", keywords: ["equity","equality","resources","need","fair","outcomes","distribution","justice"] },
  { cat: "Diversity & Social Justice", q: "Define 'privilege' in a social justice context.", a: "Privilege refers to unearned advantages granted to members of certain social groups by virtue of dominant social structures (e.g., white privilege, class privilege).", keywords: ["privilege","unearned","advantage","dominant","social group","white privilege","class","structure","systemic"] },
  { cat: "Diversity & Social Justice", q: "What is the difference between acculturation and assimilation?", a: "Acculturation is adopting elements of another culture while potentially retaining one's culture of origin. Assimilation implies fuller absorption into the dominant culture, often at the expense of cultural identity.", keywords: ["acculturation","assimilation","culture","dominant","identity","retain","adopt","origin","absorption"] },
  { cat: "Diversity & Social Justice", q: "What are microaggressions?", a: "Microaggressions are subtle, often unintentional verbal or behavioral slights that communicate derogatory or negative messages to members of marginalized groups, causing cumulative psychological harm.", keywords: ["microaggression","subtle","unintentional","marginalized","derogatory","cumulative","harm","bias","slights"] },
  { cat: "Diversity & Social Justice", q: "What is anti-oppressive practice (AOP)?", a: "AOP challenges social workers to recognize and dismantle oppressive structures in society and in their own practice, involving critical examination of power, privilege, and structural inequality.", keywords: ["anti-oppressive","AOP","oppression","power","privilege","structural","inequality","dismantle","critical"] },
  { cat: "Diversity & Social Justice", q: "What is the LGBTQ+ affirmative practice model?", a: "An affirmative practice model validates and supports LGBTQ+ clients' identities, avoids pathologizing non-heterosexual or non-cisgender identities, addresses minority stress, and challenges homophobia, biphobia, and transphobia.", keywords: ["LGBTQ","affirmative","validate","minority stress","homophobia","transphobia","biphobia","identity","cisgender","pathologize"] }
];

let cards = [...ALL_CARDS];
let currentIndex = 0;
let activeFilter = "all";

// --- Persistent state via localStorage ---
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('lgsw_state') || '{}');
    return {
      mastered: new Set(s.mastered || []),
      scores: s.scores || { correct: 0, partial: 0, incorrect: 0 },
      answered: new Set(s.answered || []),
      savedAnswers: s.savedAnswers || {},
      history: s.history || []
    };
  } catch(e) { return { mastered: new Set(), scores: { correct:0, partial:0, incorrect:0 }, answered: new Set(), savedAnswers: {}, history: [] }; }
}
function saveState() {
  try {
    localStorage.setItem('lgsw_state', JSON.stringify({
      mastered: [...mastered], scores, answered: [...answered], savedAnswers, history
    }));
  } catch(e) {}
}
let { mastered, scores, answered, savedAnswers, history } = loadState();

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9\s\-]/g, ' ').replace(/\s+/g, ' ').trim();
}

function gradeAnswer(userAnswer, card) {
  const user = normalize(userAnswer);
  if (!user || user.length < 3) return { grade: 'skip', matched: [], missed: card.keywords };
  const keywords = card.keywords;
  const matched = keywords.filter(kw => user.includes(normalize(kw)));
  const ratio = matched.length / keywords.length;
  const grade = ratio >= 0.5 ? 'correct' : ratio >= 0.2 ? 'partial' : 'incorrect';
  return { grade, matched, missed: keywords.filter(kw => !user.includes(normalize(kw))) };
}

function checkAnswer() {
  const input = document.getElementById('answerInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) return;
  const card = cards[currentIndex];
  const globalIdx = ALL_CARDS.indexOf(card);
  const { grade, matched, missed } = gradeAnswer(userAnswer, card);
  input.disabled = true;
  document.getElementById('checkBtn').disabled = true;
  const resultBox = document.getElementById('resultBox');
  const cardBox = document.getElementById('cardBox');
  resultBox.className = 'result-box show ' + grade;
  cardBox.className = 'card-box ' + grade + '-border';
  document.getElementById('resultVerdict').textContent =
    grade === 'correct' ? '✓ Great answer!' :
    grade === 'partial' ? '◑ Partial credit — close!' : '✗ Not quite — review below';
  document.getElementById('resultAnswer').innerHTML = '<strong>Full answer:</strong> ' + card.a;
  document.getElementById('keywordsHit').innerHTML =
    '<span style="font-size:11px;color:var(--muted);margin-right:4px;">Key concepts:</span>' +
    card.keywords.map(kw => `<span class="kw ${matched.includes(kw) ? 'hit' : 'miss'}">${kw}</span>`).join('');
  // Save answer text and grade
  savedAnswers[globalIdx] = { text: userAnswer, grade };
  if (!answered.has(globalIdx)) {
    answered.add(globalIdx);
    scores[grade]++;
  }
  saveState();
  updateStats();
}

function renderFilters() {
  const container = document.getElementById('filters');
  const cats = ["all", ...Object.keys(CAT_COLORS)];
  const labels = { "all": "All Cards", "Human Development & Behavior": "HDB", "Assessment & Intervention": "A&I", "Ethics & Professional Standards": "Ethics", "Diversity & Social Justice": "DSJ" };
  container.innerHTML = cats.map(cat =>
    `<button class="filter-btn ${activeFilter === cat ? 'active' : ''}" data-cat="${cat}" onclick="setFilter('${cat}')">${labels[cat]}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  cards = cat === "all" ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.cat === cat);
  currentIndex = 0;
  renderFilters();
  renderCard();
}

function renderCard() {
  if (!cards.length) return;
  const card = cards[currentIndex];
  const style = CAT_COLORS[card.cat];
  const globalIdx = ALL_CARDS.indexOf(card);
  document.getElementById('cardCat').innerHTML = `<span class="cat-dot" style="background:${style.color}"></span><span style="color:${style.color}">${card.cat}</span>`;
  document.getElementById('cardQ').textContent = card.q;
  document.getElementById('cardNum').textContent = currentIndex + 1;
  document.getElementById('cardTotal').textContent = cards.length;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / cards.length * 100) + '%';
  const input = document.getElementById('answerInput');
  const saved = savedAnswers[globalIdx];
  if (saved) {
    input.value = saved.text;
    input.disabled = true;
    document.getElementById('checkBtn').disabled = true;
    document.getElementById('showBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    // Re-show the graded result
    const { grade, matched } = gradeAnswer(saved.text, card);
    document.getElementById('resultBox').className = 'result-box show ' + grade;
    document.getElementById('cardBox').className = 'card-box ' + grade + '-border';
    document.getElementById('resultVerdict').textContent =
      grade === 'correct' ? '✓ Great answer!' :
      grade === 'partial' ? '◑ Partial credit — close!' : '✗ Not quite — review below';
    document.getElementById('resultAnswer').innerHTML = '<strong>Full answer:</strong> ' + card.a;
    document.getElementById('keywordsHit').innerHTML =
      '<span style="font-size:11px;color:var(--muted);margin-right:4px;">Key concepts:</span>' +
      card.keywords.map(kw => `<span class="kw ${matched.includes(kw) ? 'hit' : 'miss'}">${kw}</span>`).join('');
  } else {
    input.value = ''; input.disabled = false;
    document.getElementById('checkBtn').disabled = false;
    document.getElementById('showBtn').disabled = false;
    document.getElementById('skipBtn').disabled = false;
    document.getElementById('resultBox').className = 'result-box';
    document.getElementById('cardBox').className = 'card-box';
    setTimeout(() => input.focus(), 50);
  }
  const btn = document.getElementById('masteredBtn');
  if (mastered.has(globalIdx)) { btn.classList.add('done'); btn.textContent = '✓ Mastered!'; }
  else { btn.classList.remove('done'); btn.textContent = '✓ Mark Mastered'; }
  updateStats();
}

function toggleMastered() {
  const globalIdx = ALL_CARDS.indexOf(cards[currentIndex]);
  mastered.has(globalIdx) ? mastered.delete(globalIdx) : mastered.add(globalIdx);
  saveState();
  renderCard();
}

function showAnswer() {
  const card = cards[currentIndex];
  const input = document.getElementById('answerInput');
  input.disabled = true;
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('showBtn').disabled = true;
  document.getElementById('skipBtn').disabled = true;
  const resultBox = document.getElementById('resultBox');
  const cardBox = document.getElementById('cardBox');
  resultBox.className = 'result-box show partial';
  cardBox.className = 'card-box partial-border';
  document.getElementById('resultVerdict').textContent = '👁 Answer revealed — study it!';
  document.getElementById('resultAnswer').innerHTML = '<strong>Full answer:</strong> ' + card.a;
  document.getElementById('keywordsHit').innerHTML =
    '<span style="font-size:11px;color:var(--muted);margin-right:4px;">Key concepts:</span>' +
    card.keywords.map(kw => `<span class="kw miss">${kw}</span>`).join('');
}

function skipCard() {
  nextCard();
}


function nextCard() { currentIndex = (currentIndex + 1) % cards.length; renderCard(); }
function prevCard() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; renderCard(); }
function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  currentIndex = 0; renderCard();
}

function updateStats() {
  document.getElementById('statCorrect').textContent = scores.correct;
  document.getElementById('statPartial').textContent = scores.partial;
  document.getElementById('statIncorrect').textContent = scores.incorrect;
  document.getElementById('statMastered').textContent = mastered.size;
  document.getElementById('masteredCount').textContent = mastered.size;
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!el) return;
  if (history.length === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;">No sessions recorded yet.</div>'; return; }
  el.innerHTML = [...history].reverse().slice(0,10).map(h =>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
      <span style="color:var(--muted)">${h.date}</span>
      <span>
        <span style="color:var(--correct);margin-right:10px;">✓ ${h.correct}</span>
        <span style="color:var(--partial);margin-right:10px;">◑ ${h.partial}</span>
        <span style="color:var(--incorrect);">✗ ${h.incorrect}</span>
      </span>
    </div>`
  ).join('');
}

function saveSession() {
  if (scores.correct + scores.partial + scores.incorrect === 0) return;
  const now = new Date();
  const date = now.toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  history.push({ date, correct: scores.correct, partial: scores.partial, incorrect: scores.incorrect });
  scores = { correct: 0, partial: 0, incorrect: 0 };
  answered = new Set();
  savedAnswers = {};
  saveState();
  updateStats();
  alert('Session saved! Starting fresh.');
}

function resetAll() {
  if (!confirm('Clear all saved answers and scores? History will be kept.')) return;
  scores = { correct: 0, partial: 0, incorrect: 0 };
  answered = new Set();
  savedAnswers = {};
  saveState();
  renderCard();
  updateStats();
}

document.addEventListener('keydown', e => {
  const inputFocused = document.activeElement === document.getElementById('answerInput');
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); checkAnswer(); }
  if (!inputFocused) {
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === 'ArrowLeft') prevCard();
  }
});

renderFilters();
renderCard();
</script>
</body>
</html>
